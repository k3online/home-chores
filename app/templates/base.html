<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Chore Ledger{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <script src="{{ url_for('static', path='/sortable.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Chore Ledger</a>
      {% if current_user %}
        <nav>
          {% if current_user.role == "admin" %}
            <a href="/admin">Dashboard</a>
            <a href="/admin/users">Users</a>
            <a href="/admin/export/entries.csv">Export CSV</a>
          {% else %}
            <a href="/kid">My Ledger</a>
          {% endif %}
          <form method="post" action="/logout">
            <button type="submit" class="link-button">Log out</button>
          </form>
        </nav>
      {% endif %}
    </header>
    <main>
      {% for flash in flashes %}
        <div class="flash {{ flash.kind }}">{{ flash.message }}</div>
      {% endfor %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
